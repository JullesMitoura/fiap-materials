<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward & Backpropagation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Syne', sans-serif;
}
header {
  text-align: center;
  padding: 28px 20px 0;
}
header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(120deg, #00c8ff, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p {
  font-family: 'Space Mono', monospace;
  color: #475569;
  font-size: 0.62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}
.controls {
  display: flex;
  gap: 10px;
  margin: 18px 0 16px;
}
.btn {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  padding: 8px 20px;
  border-radius: 8px;
  border: 1.5px solid;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-fwd  { background: rgba(0,200,255,0.08);  border-color: #00c8ff; color: #00c8ff; }
.btn-fwd.active, .btn-fwd:hover  { background: rgba(0,200,255,0.2);  box-shadow: 0 0 18px rgba(0,200,255,0.3); }
.btn-back { background: rgba(255,107,53,0.08); border-color: #ff6b35; color: #ff6b35; }
.btn-back.active, .btn-back:hover { background: rgba(255,107,53,0.2); box-shadow: 0 0 18px rgba(255,107,53,0.3); }
.btn-both { background: rgba(168,85,247,0.08); border-color: #a855f7; color: #a855f7; }
.btn-both.active, .btn-both:hover { background: rgba(168,85,247,0.2); box-shadow: 0 0 18px rgba(168,85,247,0.3); }
canvas { border-radius: 16px; box-shadow: 0 0 0 1px #1a1a1a; }
.legend-row {
  display: flex;
  gap: 20px;
  margin-top: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: #64748b;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.leg-line { width: 28px; height: 2px; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>Forward & Backpropagation</h1>
  <p>Rede Neural Feedforward · Visualização interativa</p>
</header>
<div class="controls">
  <button class="btn btn-fwd active" onclick="setMode('forward')">→ Forward</button>
  <button class="btn btn-back" onclick="setMode('backward')">← Backward</button>
  <button class="btn btn-both" onclick="setMode('both')">⇄ Ambos</button>
</div>
<canvas id="nn" width="860" height="440"></canvas>
<div class="legend-row">
  <div class="legend-item"><div class="leg-line" style="background:#00c8ff"></div>Forward Pass</div>
  <div class="legend-item"><div class="leg-line" style="background:#ff6b35"></div>Backward Pass</div>
  <div class="legend-item"><div class="leg-line" style="background:#22c55e; opacity:0.6"></div>Cache armazenado</div>
</div>
<script>
const canvas = document.getElementById('nn');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let mode = 'forward';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  const map = { forward: 0, backward: 1, both: 2 };
  document.querySelectorAll('.btn')[map[m]].classList.add('active');
  signals = [];
}

const layers = [
  { label: 'Input\nLayer',    nodes: 4, color: '#00c8ff', glow: 'rgba(0,200,255,0.5)',  activation: '',        isInput: true  },
  { label: 'Hidden\nLayer 1', nodes: 5, color: '#a855f7', glow: 'rgba(168,85,247,0.5)', activation: 'ReLU',    isInput: false },
  { label: 'Hidden\nLayer 2', nodes: 5, color: '#a855f7', glow: 'rgba(168,85,247,0.5)', activation: 'ReLU',    isInput: false },
  { label: '···',             nodes: 3, color: '#6d28d9', glow: 'rgba(109,40,217,0.3)', activation: '',        isDots: true   },
  { label: 'Output\nLayer',   nodes: 3, color: '#ff6b35', glow: 'rgba(255,107,53,0.5)', activation: 'Sigmoid', isInput: false },
];

const R = 15, marginX = 68;
const xPos = layers.map((_, i) => marginX + ((W - marginX * 2) / (layers.length - 1)) * i);

function getY(li, ni) {
  const n = layers[li].nodes;
  const spacing = Math.min(62, (H - 100) / n);
  return H / 2 - ((n - 1) * spacing) / 2 + ni * spacing;
}

let signals = [], phase = 0;

function spawnSignal() {
  if (mode === 'forward' || mode === 'both') {
    const l = Math.floor(Math.random() * (layers.length - 1));
    if (layers[l].isDots) return;
    signals.push({ l, nA: Math.floor(Math.random() * layers[l].nodes), nB: Math.floor(Math.random() * layers[l+1].nodes), progress: 0, dir: 'fwd' });
  }
  if (mode === 'backward' || mode === 'both') {
    const l = Math.floor(Math.random() * (layers.length - 1)) + 1;
    if (layers[l].isDots || layers[l-1].isDots) return;
    signals.push({ l, nA: Math.floor(Math.random() * layers[l].nodes), nB: Math.floor(Math.random() * layers[l-1].nodes), progress: 0, dir: 'bwd' });
  }
}

setInterval(() => { if (signals.length < 16) spawnSignal(); }, 180);

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}

function drawNode(x, y, color, glow, pulse, showCache) {
  const gr = ctx.createRadialGradient(x, y, 0, x, y, R * 2.8);
  gr.addColorStop(0, glow.replace('0.5', String(0.15 + pulse * 0.3)));
  gr.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(x, y, R * 2.8, 0, Math.PI*2);
  ctx.fillStyle = gr; ctx.fill();
  if (showCache) {
    ctx.save(); ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.arc(x, y, R + 7, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(34,197,94,${0.4 + pulse * 0.3})`;
    ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
  }
  const grad = ctx.createRadialGradient(x - R*0.3, y - R*0.3, 0, x, y, R);
  grad.addColorStop(0, lighten(color, 50));
  grad.addColorStop(1, color);
  ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI*2);
  ctx.strokeStyle = lighten(color, 70); ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(x - R*0.28, y - R*0.28, R*0.26, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
}

function drawConnections() {
  for (let l = 0; l < layers.length - 1; l++) {
    if (layers[l].isDots || layers[l+1].isDots) continue;
    for (let a = 0; a < layers[l].nodes; a++) {
      for (let b = 0; b < layers[l+1].nodes; b++) {
        ctx.beginPath();
        ctx.moveTo(xPos[l], getY(l, a)); ctx.lineTo(xPos[l+1], getY(l+1, b));
        ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 0.8; ctx.stroke();
      }
    }
  }
}

function drawSignals() {
  signals = signals.filter(s => s.progress <= 1.05);
  for (const s of signals) {
    s.progress += 0.022;
    const t = Math.min(s.progress, 1);
    let x1, y1, x2, y2;
    if (s.dir === 'fwd') {
      x1 = xPos[s.l]; y1 = getY(s.l, s.nA); x2 = xPos[s.l+1]; y2 = getY(s.l+1, s.nB);
    } else {
      x1 = xPos[s.l]; y1 = getY(s.l, s.nA); x2 = xPos[s.l-1]; y2 = getY(s.l-1, s.nB);
    }
    const sx = x1 + (x2 - x1) * t, sy = y1 + (y2 - y1) * t;
    const col = s.dir === 'fwd' ? '0,200,255' : '255,107,53';
    const gr = ctx.createLinearGradient(x1, y1, sx, sy);
    gr.addColorStop(0, 'transparent'); gr.addColorStop(1, `rgba(${col},0.9)`);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(sx, sy);
    ctx.strokeStyle = gr; ctx.lineWidth = s.dir === 'fwd' ? 1.8 : 1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(sx, sy, s.dir === 'fwd' ? 4 : 3.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${col},1)`; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'white'; ctx.fill();
  }
}

function drawLabel(text, x, y, color) {
  ctx.font = '700 11px Syne, sans-serif';
  ctx.fillStyle = color; ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => ctx.fillText(line, x, y + i * 14));
}

function drawActivationBadge(x, y, text, color) {
  ctx.font = '600 9px Space Mono, monospace';
  const tw = ctx.measureText(text).width + 12;
  ctx.fillStyle = color.replace('1)', '0.12)').replace('rgb', 'rgba');
  ctx.strokeStyle = color; ctx.lineWidth = 1;
  roundRect(ctx, x - tw/2, y - 10, tw, 18, 4);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = color; ctx.textAlign = 'center';
  ctx.fillText(text, x, y + 3);
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

function drawLossNode() {
  const lx = (xPos[3] + xPos[4]) / 2, ly = H - 20;
  ctx.beginPath();
  ctx.moveTo(xPos[4], getY(4, layers[4].nodes - 1) + R + 4);
  ctx.lineTo(lx, ly - 14);
  ctx.strokeStyle = 'rgba(168,85,247,0.4)';
  ctx.lineWidth = 1; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
  ctx.font = '700 9px Space Mono, monospace';
  const lossText = 'J = Loss (BCE)';
  const tw = ctx.measureText(lossText).width + 16;
  ctx.fillStyle = 'rgba(168,85,247,0.12)';
  ctx.strokeStyle = 'rgba(168,85,247,0.7)'; ctx.lineWidth = 1;
  roundRect(ctx, lx - tw/2, ly - 12, tw, 20, 6);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(168,85,247,0.95)'; ctx.textAlign = 'center';
  ctx.fillText(lossText, lx, ly + 2);
}

function drawGradientLabels() {
  if (mode !== 'backward' && mode !== 'both') return;
  for (const [l1, l2] of [[0,1],[1,2],[3,4]]) {
    if (layers[l1].isDots || layers[l2].isDots) continue;
    ctx.font = '600 9px Space Mono, monospace';
    ctx.fillStyle = 'rgba(255,107,53,0.65)'; ctx.textAlign = 'center';
    ctx.fillText('dW, db', (xPos[l1] + xPos[l2]) / 2, H / 2 + 10);
  }
}

function frame() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  phase += 0.016;

  drawConnections();
  drawSignals();
  drawGradientLabels();

  const showCache = mode === 'forward' || mode === 'both';
  for (let l = 0; l < layers.length; l++) {
    const layer = layers[l], x = xPos[l];
    if (layer.isDots) {
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath(); ctx.arc(x, H/2 + i * 20, 4.5, 0, Math.PI*2);
        ctx.fillStyle = '#6d28d9'; ctx.fill();
      }
      continue;
    }
    for (let n = 0; n < layer.nodes; n++) {
      const y = getY(l, n), pulse = 0.5 + 0.5 * Math.sin(phase + l * 1.1 + n * 0.7);
      drawNode(x, y, layer.color, layer.glow, pulse, showCache && !layer.isInput && l < layers.length - 1);
    }
    drawLabel(layer.label, x, getY(l, 0) - R - 22, layer.color);
    if (layer.activation) {
      drawActivationBadge(x, getY(l, layer.nodes - 1) + R + 22,
        layer.activation, layer.activation === 'ReLU' ? 'rgba(34,197,94,1)' : 'rgba(255,107,53,1)');
    }
  }

  // Hidden Layers brace
  const hx1 = xPos[1], hx2 = xPos[3], braceY = getY(1, 0) - R - 42;
  ctx.beginPath();
  ctx.moveTo(hx1, braceY + 8); ctx.lineTo(hx1, braceY);
  ctx.lineTo(hx2, braceY); ctx.lineTo(hx2, braceY + 8);
  ctx.strokeStyle = 'rgba(168,85,247,0.45)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = '700 11px Syne, sans-serif';
  ctx.fillStyle = 'rgba(168,85,247,0.85)'; ctx.textAlign = 'center';
  ctx.fillText('Hidden Layers', (hx1 + hx2) / 2, braceY - 5);

  // Direction labels
  ctx.font = '600 10px Space Mono, monospace'; ctx.textAlign = 'center';
  if (mode === 'forward' || mode === 'both') {
    ctx.fillStyle = 'rgba(0,200,255,0.7)';
    ctx.fillText('Forward →', (xPos[0] + xPos[1]) / 2, 24);
  }
  if (mode === 'backward' || mode === 'both') {
    ctx.fillStyle = 'rgba(255,107,53,0.7)';
    ctx.fillText('← Backward', (xPos[3] + xPos[4]) / 2, 24);
  }

  if (mode === 'forward' || mode === 'both') drawLossNode();

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
