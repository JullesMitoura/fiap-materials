<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurônio Artificial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}
h1 {
  font-family: 'Crimson Pro', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: #e2e8f0;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
p.sub {
  font-size: 0.62rem;
  color: #334155;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.formula-bar {
  margin-top: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,180,255,0.12);
  border-radius: 10px;
  padding: 12px 28px;
  display: flex;
  gap: 32px;
}
.formula-item { text-align: center; }
.formula-item .label {
  font-size: 0.58rem;
  color: #475569;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.formula-item .eq {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 1rem;
  color: #94a3b8;
}
.formula-item .eq span { color: #00c8ff; font-style: normal; }
.formula-item .eq .acc { color: #00e5a0; }
.formula-item .eq .out { color: #f59e0b; }
</style>
</head>
<body>
<h1>Neurônio Artificial</h1>
<p class="sub">Modelo de Perceptron</p>
<canvas id="c" width="780" height="360"></canvas>
<div class="formula-bar">
  <div class="formula-item">
    <div class="label">Soma ponderada</div>
    <div class="eq"><span>z</span> = Σ <span>wᵢ</span> · xᵢ + b</div>
  </div>
  <div class="formula-item">
    <div class="label">Saída</div>
    <div class="eq"><span class="out">y</span> = <span class="acc">φ</span>(<span>z</span>)</div>
  </div>
  <div class="formula-item">
    <div class="label">Ativação</div>
    <div class="eq"><span class="acc">φ</span>(z) = ReLU / Sigmoid</div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const inputs = ['x₀', 'x₁', 'x₂', '·', '·', 'xₙ'];
const weights = ['w₀', 'w₁', 'w₂', null, null, 'wₙ'];
const isDot = [false, false, false, true, true, false];
const N = inputs.length;
const inputX = 80, weightX = 230, sumX = 430, actX = 580, outX = 720;
const spacing = 48, totalH = (N - 1) * spacing, startY = H / 2 - totalH / 2;
const rInput = 22, rWeight = 18, rSum = 32, rAct = 30;
function getY(i) { return startY + i * spacing; }
let phase = 0, signals = [];
function spawnSignal() {
  const i = Math.floor(Math.random() * N);
  if (isDot[i]) return;
  signals.push({ i, progress: 0 });
}
setInterval(() => { if (signals.length < 8) spawnSignal(); }, 250);
function lerp(a, b, t) { return a + (b - a) * t; }
function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255,(n>>16)+amt), g = Math.min(255,((n>>8)&0xff)+amt), b = Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}
function glowCircle(x, y, r, color, glowColor, glowR, pulse) {
  const gr = ctx.createRadialGradient(x, y, 0, x, y, glowR);
  gr.addColorStop(0, glowColor.replace('A', String(0.12 + pulse * 0.2)));
  gr.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI*2);
  ctx.fillStyle = gr; ctx.fill();
  const bg = ctx.createRadialGradient(x - r*0.3, y - r*0.3, 0, x, y, r);
  bg.addColorStop(0, lighten(color, 55));
  bg.addColorStop(1, color);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.strokeStyle = lighten(color, 80); ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(x - r*0.28, y - r*0.28, r*0.25, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
}
function drawLine(x1, y1, x2, y2, color, width=1) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.stroke();
}
function drawArrow(x1, y1, x2, y2, color) {
  const angle = Math.atan2(y2-y1, x2-x1), len = 9;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - len*Math.cos(angle-0.4), y2 - len*Math.sin(angle-0.4));
  ctx.lineTo(x2 - len*Math.cos(angle+0.4), y2 - len*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
}
function drawText(text, x, y, color, size='13px', align='center') {
  ctx.font = `${size} JetBrains Mono, monospace`;
  ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}
function drawItalic(text, x, y, color, size='15px') {
  ctx.font = `italic ${size} Crimson Pro, serif`;
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}
function frame() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  phase += 0.018;

  for (let i = 0; i < N; i++) {
    if (isDot[i]) continue;
    drawLine(inputX + rInput + 4, getY(i), weightX - rWeight - 4, getY(i), 'rgba(0,180,255,0.15)');
  }
  for (let i = 0; i < N; i++) {
    if (isDot[i]) continue;
    drawLine(weightX + rWeight + 4, getY(i), sumX - rSum - 4, H/2, 'rgba(0,180,255,0.12)');
  }
  drawLine(sumX + rSum + 4, H/2, actX - rAct - 4, H/2, 'rgba(0,200,160,0.3)', 1.5);
  drawArrow(sumX + rSum + 4, H/2, actX - rAct - 4, H/2, 'rgba(0,200,160,0.5)');
  drawLine(actX + rAct + 4, H/2, outX - 10, H/2, 'rgba(245,158,11,0.5)', 2);
  drawArrow(outX - 8, H/2, outX + 2, H/2, 'rgba(245,158,11,0.8)');

  signals = signals.filter(s => s.progress < 3.5);
  for (const s of signals) {
    s.progress += 0.03;
    const { i, progress } = s;
    const iy = getY(i);
    const dotColor = progress < 2 ? '0,200,255' : progress < 3 ? '0,229,160' : '245,158,11';
    let sx, sy;
    if (progress < 1) {
      sx = lerp(inputX + rInput, weightX - rWeight, progress); sy = iy;
    } else if (progress < 2) {
      const t = progress - 1;
      sx = lerp(weightX + rWeight, sumX - rSum, t); sy = lerp(iy, H/2, t);
    } else if (progress < 3) {
      const t = progress - 2;
      sx = lerp(sumX + rSum, actX - rAct, t); sy = H/2;
    } else {
      const t = progress - 3;
      sx = lerp(actX + rAct, outX, t); sy = H/2;
    }
    const gtr = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
    gtr.addColorStop(0, `rgba(${dotColor},0.6)`);
    gtr.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(sx, sy, 30, 0, Math.PI*2);
    ctx.fillStyle = gtr; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, 4.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${dotColor},1)`; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI*2);
    ctx.fillStyle = 'white'; ctx.fill();
  }

  const boxW = 60, boxH = totalH + 40;
  const boxX = inputX - boxW/2, boxY = H/2 - boxH/2;
  ctx.save();
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = 'rgba(0,180,255,0.35)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, boxX, boxY, boxW, boxH, 10);
  ctx.stroke();
  ctx.restore();

  drawText('Inputs', inputX, boxY - 18, 'rgba(0,180,255,0.7)', '12px');
  drawText('Pesos', weightX, startY - 26, '#a78bfa', '12px');

  for (let i = 0; i < N; i++) {
    const y = getY(i);
    if (isDot[i]) {
      ctx.beginPath(); ctx.arc(inputX, y, 3, 0, Math.PI*2);
      ctx.fillStyle = '#1e40af'; ctx.fill();
      continue;
    }
    const pulse = 0.4 + 0.6 * Math.sin(phase + i * 0.9);
    glowCircle(inputX, y, rInput, '#1d4ed8', 'rgba(29,78,216,A)', rInput*2.2, pulse);
    drawItalic(inputs[i], inputX, y, '#93c5fd', '14px');
  }
  for (let i = 0; i < N; i++) {
    const y = getY(i);
    if (isDot[i]) {
      for (let d = -1; d <= 1; d++) {
        ctx.beginPath(); ctx.arc(weightX, y + d*10, 3, 0, Math.PI*2);
        ctx.fillStyle = '#2563eb'; ctx.fill();
      }
      continue;
    }
    const pulse = 0.4 + 0.6 * Math.sin(phase * 1.1 + i * 0.8 + 1);
    glowCircle(weightX, y, rWeight, '#1e40af', 'rgba(30,64,175,A)', rWeight*2.2, pulse);
    drawItalic(weights[i], weightX, y, '#93c5fd', '13px');
  }

  const sp = 0.5 + 0.5 * Math.sin(phase * 0.9);
  glowCircle(sumX, H/2, rSum, '#0e7490', 'rgba(14,116,144,A)', rSum*2.5, sp);
  ctx.font = 'bold 22px serif';
  ctx.fillStyle = '#e0f2fe';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Σ', sumX, H/2);

  const ap = 0.5 + 0.5 * Math.sin(phase * 0.8 + 2);
  const ar = rAct;
  const aglow = ctx.createRadialGradient(actX, H/2, 0, actX, H/2, ar*2.8);
  aglow.addColorStop(0, `rgba(0,229,160,${0.1 + ap*0.2})`);
  aglow.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(actX, H/2, ar*2.8, 0, Math.PI*2);
  ctx.fillStyle = aglow; ctx.fill();
  ctx.fillStyle = 'rgba(5,150,100,0.9)';
  ctx.strokeStyle = 'rgba(0,229,160,0.8)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, actX - ar, H/2 - ar, ar*2, ar*2, 10);
  ctx.fill(); ctx.stroke();
  ctx.font = 'italic bold 22px Crimson Pro, serif';
  ctx.fillStyle = '#d1fae5';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('φ', actX, H/2);
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.fillStyle = 'rgba(0,229,160,0.6)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Função de', actX, H/2 + ar + 8);
  ctx.fillText('Ativação', actX, H/2 + ar + 20);

  ctx.font = 'italic bold 18px Crimson Pro, serif';
  ctx.fillStyle = '#fcd34d';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('y', outX + 6, H/2 - 2);
  ctx.font = 'italic 11px Crimson Pro, serif';
  ctx.fillStyle = '#fbbf24';
  ctx.fillText('RNA', outX + 18, H/2 + 5);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
